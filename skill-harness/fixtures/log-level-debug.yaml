id: log-level-debug
tier: required
tags: [logging, diagnosis]
user_prompt: |
  Generate a gateway with gateway.log_level set to TRACE so we
  can diagnose a production issue. Use the typed top-level
  gateway.log_level field, not gateway.advanced. Include a
  single MCP server named "my-api" at https://my-api.acme.com/mcp
  that uses a static bearer token — use the exact placeholder
  "<REPLACE_WITH_BEARER_TOKEN>" (including the angle brackets)
  as the token value. My Auth0 tenant is acme.us.auth0.com,
  audience https://api.acme.com. Emit the YAML inline in a
  fenced code block; do not try to call any tools.
followups:
  - match: "(server url|mcp server|url|token|name|endpoint|log|level|trace|debug)"
    reply: |
      Set gateway.log_level: TRACE (as the typed field, not via
      gateway.advanced). Server name "my-api", url
      https://my-api.acme.com/mcp, bearer token
      "<REPLACE_WITH_BEARER_TOKEN>" (keep the angle brackets).
      Emit the YAML inline.
expect:
  must_validate: true
  required_paths:
    - gateway.log_level
  value_constraints:
    - path: "gateway.log_level"
      equals: TRACE
  semantic_rubric:
    - "Uses the typed gateway.log_level field, not gateway.advanced"
clarifying_question_expected: false
