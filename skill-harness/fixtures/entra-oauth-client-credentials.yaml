# Sources (verified 2026-04-22):
#   - https://learn.microsoft.com/entra/identity-platform/v2-protocols         (mandatory /v2.0 issuer suffix)
#   - https://learn.microsoft.com/entra/identity-platform/access-tokens        (aud shape: api://{guid} or URI)
#   - https://learn.microsoft.com/entra/identity-platform/scopes-oidc          (.default scope for client_credentials)
#   - https://learn.microsoft.com/entra/identity-platform/v2-oauth2-client-creds-grant-flow
#   - Entra does NOT implement RFC 7591 DCR — app registration is Graph-API only. Verified via docs above.
# Schema ref: packages/libs/utils/schema-reference.json
#   generatorVersion 1.0.0 — gateway.authentication.jwks_info, mcp_servers[].authentication (oauth)
id: entra-oauth-client-credentials
tier: aspirational
tags: [entra, azure_ad, oauth, client_credentials, no_dcr, idp_variety]
user_prompt: |
  Generate a gateway for my Microsoft Entra ID tenant
  72f988bf-86f1-41af-91ab-2d7cd011db47. Gateway audience is
  api://d2-mcp-gateway. The upstream MCP server is a backend
  service at https://mcp.services.acme.com/mcp that we registered
  in Entra — client_id svc-mcp-backend, client_secret as a
  placeholder we'll fill from env later, token endpoint
  https://login.microsoftonline.com/72f988bf-86f1-41af-91ab-2d7cd011db47/oauth2/v2.0/token.
  Use the v2.0 endpoints. Request the `.default` scope.
expect:
  must_validate: true
  required_paths:
    - gateway.authentication.jwks_info.jwt_algorithm
    - gateway.authentication.jwks_info.jwt_jwks_uri
    - gateway.authentication.jwks_info.jwt_issuer
    - gateway.authentication.jwks_info.jwt_audience
    - mcp_servers[0].name
    - mcp_servers[0].url
    - mcp_servers[0].authentication.type
    - mcp_servers[0].authentication.grant_type
    - mcp_servers[0].authentication.client_id
    - mcp_servers[0].authentication.client_secret
    - mcp_servers[0].authentication.token_url
    - mcp_servers[0].authentication.scopes
  forbidden_paths:
    - mcp_servers[0].authentication.issuer
    - mcp_servers[0].authentication.pkce_enabled
    - mcp_servers[0].authentication.redirect_uri
    - mcp_servers[0].authentication.authorization_url
  value_constraints:
    - path: "gateway.authentication.jwks_info.jwt_issuer"
      regex: "^https://login\\.microsoftonline\\.com/.+/v2\\.0$"
    - path: "gateway.authentication.jwks_info.jwt_jwks_uri"
      regex: "^https://login\\.microsoftonline\\.com/.+/discovery/v2\\.0/keys$"
    - path: "gateway.authentication.jwks_info.jwt_audience"
      equals: "api://d2-mcp-gateway"
    - path: "mcp_servers[0].authentication.type"
      equals: oauth
    - path: "mcp_servers[0].authentication.grant_type"
      equals: client_credentials
    - path: "mcp_servers[0].authentication.client_secret"
      regex: "^<?(REPLACE_|PLACEHOLDER_|CHANGE_?ME|YOUR[_-]|your[_-])|^\\$\\{"
    - path: "mcp_servers[0].authentication.token_url"
      regex: "^https://login\\.microsoftonline\\.com/.+/oauth2/v2\\.0/token$"
    - path: "mcp_servers[0].authentication.scopes"
      min_length: 1
  semantic_rubric:
    - "Issuer ends in /v2.0 (mandatory for Entra v2 tokens) while JWKS path has no /v2.0 segment"
    - "Uses static client triple (client_id + client_secret + token_url) — Entra does not support RFC 7591 DCR"
    - "Scope uses the `.default` suffix for client_credentials (e.g. api://…/.default), not a per-scope string"
    - "No PKCE / redirect_uri / authorization_url — this is a machine-to-machine flow"
clarifying_question_expected: false
