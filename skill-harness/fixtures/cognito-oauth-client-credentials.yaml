# Sources (verified 2026-04-22):
#   - https://docs.aws.amazon.com/cognito/latest/developerguide/amazon-cognito-user-pools-using-tokens-with-identity-providers.html
#   - https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pools-app-idp-settings.html
#   - https://docs.aws.amazon.com/cognito/latest/developerguide/amazon-cognito-user-pools-app-integration.html
#   Key gotchas confirmed:
#   - Cognito access tokens carry NO `aud` claim — validate `client_id` instead. The gateway's jwt_audience is set to the client_id.
#   - Issuer + JWKS live on cognito-idp.{region}.amazonaws.com; authorize/token on the hosted UI domain (distinct host).
#   - No RFC 7591 DCR; clients created via AWS API/console only.
# Schema ref: packages/libs/utils/schema-reference.json
#   generatorVersion 1.0.0 — gateway.authentication.jwks_info, mcp_servers[].authentication (oauth)
id: cognito-oauth-client-credentials
tier: aspirational
tags: [cognito, aws, oauth, client_credentials, no_dcr, idp_variety, audience_gotcha]
user_prompt: |
  Generate a gateway that validates tokens from my AWS Cognito
  user pool us-east-1_AbCdEfGhI in region us-east-1. Hook up a
  backend MCP server at https://mcp.services.acme.com/mcp using
  Cognito client_credentials — client_id 3n4b5c6d7e8f9g0h,
  client_secret as a placeholder we'll fill from env later, token
  endpoint
  https://acme-prod.auth.us-east-1.amazoncognito.com/oauth2/token.
  Gateway expects the access token's `client_id` to match
  3n4b5c6d7e8f9g0h — Cognito access tokens have no `aud` claim,
  so set the gateway audience accordingly.
expect:
  must_validate: true
  required_paths:
    - gateway.authentication.jwks_info.jwt_algorithm
    - gateway.authentication.jwks_info.jwt_jwks_uri
    - gateway.authentication.jwks_info.jwt_issuer
    - gateway.authentication.jwks_info.jwt_audience
    - mcp_servers[0].name
    - mcp_servers[0].url
    - mcp_servers[0].authentication.type
    - mcp_servers[0].authentication.grant_type
    - mcp_servers[0].authentication.client_id
    - mcp_servers[0].authentication.client_secret
    - mcp_servers[0].authentication.token_url
    - mcp_servers[0].authentication.scopes
  forbidden_paths:
    - mcp_servers[0].authentication.issuer
    - mcp_servers[0].authentication.pkce_enabled
    - mcp_servers[0].authentication.redirect_uri
    - mcp_servers[0].authentication.authorization_url
  value_constraints:
    - path: "gateway.authentication.jwks_info.jwt_issuer"
      regex: "^https://cognito-idp\\.[a-z0-9-]+\\.amazonaws\\.com/[a-z0-9-]+_[A-Za-z0-9]+$"
    - path: "gateway.authentication.jwks_info.jwt_jwks_uri"
      regex: "^https://cognito-idp\\.[a-z0-9-]+\\.amazonaws\\.com/[a-z0-9-]+_[A-Za-z0-9]+/\\.well-known/jwks\\.json$"
    - path: "gateway.authentication.jwks_info.jwt_audience"
      equals: "3n4b5c6d7e8f9g0h"
    - path: "mcp_servers[0].authentication.type"
      equals: oauth
    - path: "mcp_servers[0].authentication.grant_type"
      equals: client_credentials
    - path: "mcp_servers[0].authentication.client_secret"
      regex: "^<?(REPLACE_|PLACEHOLDER_|CHANGE_?ME|YOUR[_-]|your[_-])|^\\$\\{"
    - path: "mcp_servers[0].authentication.token_url"
      regex: "^https://[a-z0-9-]+\\.auth\\.[a-z0-9-]+\\.amazoncognito\\.com/oauth2/token$"
  semantic_rubric:
    - "Issuer uses cognito-idp.{region}.amazonaws.com/{userPoolId} — NOT the hosted-UI domain"
    - "JWKS URI uses /.well-known/jwks.json — NOT /v1/keys or /protocol/openid-connect/certs"
    - "Audience is the Cognito client_id, because Cognito access tokens carry no `aud` claim — this is the key Cognito gotcha"
    - "Token endpoint lives on the hosted-UI domain (…amazoncognito.com), distinct from the issuer host"
    - "Uses the static client triple — Cognito does not support RFC 7591 DCR"
clarifying_question_expected: false
