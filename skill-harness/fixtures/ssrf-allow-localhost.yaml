id: ssrf-allow-localhost
tier: required
tags: [ssrf, safe_default_opt_out, local_dev]
user_prompt: |
  I'm running the gateway locally against an MCP server on
  127.0.0.1. Generate a config that sets gateway.ssrf.allow_localhost
  to true so the gateway can reach localhost during development.
  Include one MCP server named "my-api" at
  http://127.0.0.1:8080/mcp that uses a static bearer token — use
  the exact placeholder "<REPLACE_WITH_BEARER_TOKEN>" (including
  the angle brackets) as the token value. My Auth0 tenant is
  acme.us.auth0.com, audience https://api.acme.com. Leave every
  other SSRF default intact, and add a comment noting this is for
  local development only. Emit the YAML inline in a fenced code
  block; do not try to call any tools.
followups:
  - match: "(server url|mcp server|url|token|name|endpoint|ssrf|localhost|127)"
    reply: |
      Set gateway.ssrf.allow_localhost: true (do not weaken any
      other SSRF default). Server name "my-api", url
      http://127.0.0.1:8080/mcp, bearer token
      "<REPLACE_WITH_BEARER_TOKEN>" (keep the angle brackets).
      Emit the YAML inline with a comment that this is
      local-development only.
expect:
  must_validate: true
  required_paths:
    - gateway.ssrf.allow_localhost
  value_constraints:
    - path: "gateway.ssrf.allow_localhost"
      equals: true
  # Explicit opt-out: the user asked for the weakening, so the
  # safe-defaults check should not fire on this path.
  safe_default_opt_out:
    - gateway.ssrf.allow_localhost
  semantic_rubric:
    - "Emits a warning or comment explaining this is local-development only"
    - "Does not weaken any other SSRF default"
clarifying_question_expected: false
