id: github-oauth-client-credentials
tier: required
tags: [oauth, client_credentials, m2m, github]
user_prompt: |
  Set up an internal GitHub-style MCP service that uses OAuth
  client_credentials (machine-to-machine) — NOT DCR and NOT a
  user-delegated code flow. Create a single MCP server named
  "github-mcp" at https://api.githubcopilot.com/mcp/. On its
  oauth authentication block set:
    - grant_type: client_credentials
    - client_id: "<REPLACE_WITH_CLIENT_ID>"
    - client_secret: "<REPLACE_WITH_CLIENT_SECRET>"
    - token_url: https://auth.internal.acme.com/oauth/token
  Include at least one scope (e.g. "repo:read"). Do NOT emit
  pkce_enabled, redirect_uri, or authorization_url — those
  belong to user-delegated flows. My Auth0 tenant is
  acme.us.auth0.com, audience https://api.acme.com. Use the
  exact placeholders (including the angle brackets) for the
  client_id and client_secret values. Emit the YAML inline in a
  fenced code block; do not try to call any tools.
followups:
  - match: "(server url|mcp server|url|token|name|endpoint|client_id|client_secret|token_url|grant|scope|pkce|redirect|authorization)"
    reply: |
      grant_type: client_credentials (M2M). Server name
      "github-mcp", url https://api.githubcopilot.com/mcp/.
      client_id "<REPLACE_WITH_CLIENT_ID>", client_secret
      "<REPLACE_WITH_CLIENT_SECRET>" (keep the angle brackets),
      token_url https://auth.internal.acme.com/oauth/token.
      Include a scope like "repo:read". Do NOT emit
      pkce_enabled, redirect_uri, or authorization_url. Emit the
      YAML inline.
expect:
  must_validate: true
  required_paths:
    - gateway.authentication.jwks_info.jwt_algorithm
    - gateway.authentication.jwks_info.jwt_jwks_uri
    - gateway.authentication.jwks_info.jwt_issuer
    - gateway.authentication.jwks_info.jwt_audience
    - mcp_servers[0].name
    - mcp_servers[0].url
    - mcp_servers[0].authentication.type
    - mcp_servers[0].authentication.grant_type
    - mcp_servers[0].authentication.client_id
    - mcp_servers[0].authentication.client_secret
    - mcp_servers[0].authentication.token_url
    - mcp_servers[0].authentication.scopes
  forbidden_paths:
    - mcp_servers[0].authentication.pkce_enabled
    - mcp_servers[0].authentication.redirect_uri
    - mcp_servers[0].authentication.authorization_url
  value_constraints:
    - path: "mcp_servers[0].authentication.type"
      equals: oauth
    - path: "mcp_servers[0].authentication.grant_type"
      equals: client_credentials
    - path: "mcp_servers[0].authentication.client_secret"
      regex: "^<REPLACE_|\\$\\{|CHANGE_?ME"
    - path: "mcp_servers[0].authentication.scopes"
      min_length: 1
  semantic_rubric:
    - "Uses the static client triple (client_id + client_secret + token_url), not DCR"
    - "Does not include PKCE / redirect_uri / authorization_url — those belong to user-delegated flows"
clarifying_question_expected: false
