id: contradictory-dcr-with-secret
tier: aspirational
tags: [contradictory, oauth, dcr]
user_prompt: |
  Set up OAuth for an MCP server. Issuer is
  https://mcp.atlassian.com (enable DCR) AND use this client
  secret from our vault. My Auth0 tenant is acme.us.auth0.com,
  audience https://api.acme.com.
followups:
  - match: /dcr|secret|pick|choose/i
    reply: "Use DCR; drop the secret."
expect:
  must_validate: true
  semantic_rubric:
    - "Recognizes the contradiction — DCR and a static client_secret cannot coexist"
    - "Either clarifies, or picks one path cleanly (DCR = issuer only; static = client_id + client_secret + token_url)"
clarifying_question_expected: true
